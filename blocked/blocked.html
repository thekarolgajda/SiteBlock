<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Blocked — SiteBlock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="container">
    <div class="breath" aria-hidden="true">
      <span class="ring ring-1"></span>
      <span class="ring ring-2"></span>
      <span class="ring ring-3"></span>
      <span class="core"></span>
    </div>
    <h1>You blocked this site</h1>
    <p class="site-name" id="siteName"></p>
    <p class="message">Past-you made this decision for a reason.</p>
    <div class="actions">
      <button class="btn-manage" id="manageBtn">Manage block list</button>
    </div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
